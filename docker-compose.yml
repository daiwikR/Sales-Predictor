version: "3.9"

# ============================================================================
# Superstore MLOps Forecast — Docker Compose
# Services: mlflow (port 5000) | api (port 8000) | dashboard (port 8501)
# ============================================================================

services:

  # ── MLflow Tracking Server ────────────────────────────────────────────────
  mlflow:
    build:
      context: .
      dockerfile: mlflow.Dockerfile
    container_name: superstore_mlflow
    ports:
      - "5000:5000"
    volumes:
      - mlflow_data:/mlflow
    networks:
      - superstore_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── FastAPI Prediction Server ─────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        TARGET: api
    container_name: superstore_api
    ports:
      - "8000:8000"
    volumes:
      - ./models:/app/models:ro
      - ./data:/app/data:ro
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - PYTHONPATH=/app
    depends_on:
      mlflow:
        condition: service_started
    networks:
      - superstore_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  # ── Streamlit Dashboard ───────────────────────────────────────────────────
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        TARGET: dashboard
    container_name: superstore_dashboard
    ports:
      - "8501:8501"
    volumes:
      - ./models:/app/models:ro
      - ./data:/app/data:ro
    environment:
      - API_URL=http://api:8000
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - PYTHONPATH=/app
    depends_on:
      api:
        condition: service_healthy
    networks:
      - superstore_net
    restart: unless-stopped

# ── Shared volumes ────────────────────────────────────────────────────────
volumes:
  mlflow_data:
    driver: local

# ── Network ───────────────────────────────────────────────────────────────
networks:
  superstore_net:
    driver: bridge
